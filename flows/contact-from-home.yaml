name: contact-from-home
title: How to contact GRIMME from the home page
description: >
  Walkthrough for finding the contact form on grimme.com, filling in your
  details, and submitting an enquiry.
site: https://grimme.com/en
output_dir: output/contact-from-home

video:
  scroll_duration_ms: 3500
  music: assets/music/background.mp3
  music_volume: 0.45
  music_volume_with_voice: 0.08
  voice: en-GB-SoniaNeural
  voiceover: true
  highlight_color: "#F5C518"

steps:
  - id: home
    action: goto
    url: https://grimme.com/en
    wait_for:
      role: button
      name: Open navigation
    title: Open the GRIMME home page
    description: >
      Start on the GRIMME English home page. The main navigation menu is in the
      top right corner of the page.
    screenshot: fullPage

  - id: open-menu
    action: click
    locator:
      role: button
      name: Open navigation
    title: Open the navigation menu
    description: >
      Click the **menu button** in the top right corner to open the site
      navigation.
    highlight: true
    scroll_before: false
    wait_after_ms: 800
    screenshot: viewport

  - id: click-contact
    action: click
    locator:
      role: link
      name: Contact
      within:
        role: dialog
    title: Choose Contact from the menu
    description: >
      In the menu that opens, click **Contact** to go to the service page.
    highlight: true
    scroll_before: false
    click_force: true
    wait_for_url: "**/service#contact"
    wait_after_ms: 1200
    screenshot: viewport

  - id: scroll-to-form
    action: scroll_to
    locator:
      role: button
      name: Send inquiry
    title: Open the contact enquiry form
    description: >
      The page scrolls to the **contact enquiry form** where you can enter your
      details and click **Send inquiry**.
    highlight: true
    screenshot: viewport

  - id: contact-form
    action: assert_visible
    locator:
      css: '#E-mail\\ address, input[id="E-mail address"]'
    title: Confirm the contact form is visible
    description: >
      You should now see the enquiry form fields including your email address
      and message, ready to fill in.
    highlight: true
    screenshot: viewport

  - id: fill-email
    action: fill
    locator:
      css: 'input[id="E-mail address"]'
    value: demo@example.com
    title: Enter your email address
    description: >
      Click the **E-mail address** field and type your email address.
    highlight: true
    scroll_before: false
    type_delay_ms: 70
    wait_after_ms: 700
    screenshot: viewport

  - id: fill-first-name
    action: fill
    locator:
      css: 'input[id="First name"]'
    value: Alex
    title: Enter your first name
    description: >
      After your email, additional fields appear. Type your **first name**.
    highlight: true
    scroll_before: false
    type_delay_ms: 65
    wait_after_ms: 600
    screenshot: viewport

  - id: fill-surname
    action: fill
    locator:
      css: 'input[id="Surname"]'
    value: Demo
    title: Enter your surname
    description: >
      Type your **surname** in the contact details section.
    highlight: true
    scroll_before: false
    type_delay_ms: 65
    wait_after_ms: 600
    screenshot: viewport

  - id: fill-postal-code
    action: fill
    locator:
      css: 'input[id="Postal code"]'
    value: '49504'
    title: Enter your postal code
    description: >
      Type your **postal code**. Country defaults to Germany.
    highlight: true
    scroll_before: false
    type_delay_ms: 60
    wait_after_ms: 600
    screenshot: viewport

  - id: fill-message
    action: fill
    locator:
      css: 'input[id="Your message"]'
    value: I would like more information about your products.
    title: Enter your message
    description: >
      Click the **Your message** field and type your enquiry.
    highlight: true
    scroll_before: false
    type_delay_ms: 55
    wait_after_ms: 700
    screenshot: viewport

  - id: submit-form
    action: click
    locator:
      role: button
      name: Send inquiry
    title: Submit the enquiry form
    description: >
      Click **Send inquiry** to submit your contact request.
    highlight: true
    scroll_before: false
    click_force: true
    wait_after_ms: 1500
    screenshot: viewport

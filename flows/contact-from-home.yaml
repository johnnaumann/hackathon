name: contact-from-home
title: How to reach the GRIMME contact form from the home page
description: >
  Walkthrough for finding the contact form on grimme.com starting from the
  English home page.
site: https://grimme.com/en
output_dir: output/contact-from-home

steps:
  - id: home
    action: goto
    url: https://grimme.com/en
    title: Open the GRIMME home page
    description: >
      Navigate to the English home page at grimme.com/en. This is the starting
      point for all public site navigation.
    screenshot: fullPage

  - id: accept-cookies
    action: click_optional
    locator:
      role: button
      name: Accept all
    title: Accept cookies (if prompted)
    description: >
      If a cookie consent banner appears, click **Accept all** so the page
      displays normally. This step is skipped automatically when no banner is shown.
    screenshot: none

  - id: scroll-to-contact
    action: scroll_to
    locator:
      role: heading
      name: Your direct line to us
    title: Scroll to the contact section
    description: >
      On the home page, scroll down to the **Your direct line to us** section
      near the bottom. Here you will find phone, email, and the contact form link.
    highlight: true
    screenshot: viewport

  - id: open-contact-form
    action: click
    locator:
      role: link
      name: Open form
    title: Open the contact form
    description: >
      In the contact section, click **Open form** under "Use our contact form"
      to go to the GRIMME contact page.
    highlight: true
    screenshot: viewport

  - id: contact-page
    action: assert_visible
    locator:
      role: heading
      name: Your Service - Contacts
    title: Confirm you are on the contact page
    description: >
      You should now see the **Your Service - Contacts** page with the enquiry
      form and GRIMME contact details.
    screenshot: fullPage

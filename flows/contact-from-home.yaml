name: contact-from-home
title: How to reach the GRIMME contact form from the home page
description: >
  Walkthrough for finding the contact form on grimme.com using the navigation
  menu from the English home page.
site: https://grimme.com/en
output_dir: output/contact-from-home

video:
  scroll_duration_ms: 3500

steps:
  - id: home
    action: goto
    url: https://grimme.com/en
    wait_for:
      role: button
      name: Open navigation
    title: Open the GRIMME home page
    description: >
      Start on the GRIMME English home page. The main navigation menu is in the
      top right corner of the page.
    screenshot: fullPage

  - id: open-menu
    action: click
    locator:
      role: button
      name: Open navigation
    title: Open the navigation menu
    description: >
      Click the **menu button** in the top right corner to open the site
      navigation.
    highlight: true
    scroll_before: false
    wait_after_ms: 800
    screenshot: viewport

  - id: click-contact
    action: click
    locator:
      role: link
      name: Contact
      within:
        role: dialog
    title: Choose Contact from the menu
    description: >
      In the menu that opens, click **Contact** to go to the service page.
    highlight: true
    scroll_before: false
    click_force: true
    wait_for_url: "**/service#contact"
    wait_after_ms: 1200
    screenshot: viewport

  - id: scroll-to-form
    action: scroll_to
    locator:
      role: button
      name: Send inquiry
    title: Open the contact enquiry form
    description: >
      The page scrolls to the **contact enquiry form** where you can enter your
      details and click **Send inquiry**.
    highlight: true
    screenshot: viewport

  - id: contact-form
    action: assert_visible
    locator:
      css: '#E-mail\\ address, input[id="E-mail address"]'
    title: Confirm the contact form is visible
    description: >
      You should now see the enquiry form fields including your email address
      and message, ready to submit.
    highlight: true
    screenshot: viewport

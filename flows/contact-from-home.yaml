name: contact-from-home
title: How to reach the GRIMME contact form from the home page
description: >
  Walkthrough for finding the contact form on grimme.com using the navigation
  menu from the English home page.
site: https://grimme.com/en
output_dir: output/contact-from-home

video:
  scroll_duration_ms: 3500

steps:
  - id: home
    action: goto
    url: https://grimme.com/en
    wait_for:
      role: button
      name: Open navigation
    title: Open the GRIMME home page
    description: >
      Start on the GRIMME English home page. The main navigation menu is in the
      top right corner of the page.
    screenshot: fullPage

  - id: open-menu
    action: click
    locator:
      role: button
      name: Open navigation
    title: Open the navigation menu
    description: >
      Click the **menu button** in the top right corner to open the site
      navigation.
    highlight: true
    scroll_before: false
    screenshot: viewport

  - id: click-contact
    action: click
    locator:
      role: link
      name: Contact
      within:
        role: dialog
    title: Choose Contact from the menu
    description: >
      In the menu that opens, click **Contact**. The page will scroll to the
      contact form section.
    highlight: true
    screenshot: viewport

  - id: contact-form
    action: assert_visible
    locator:
      role: heading
      name: Contact
      exact: true
    title: View the contact form
    description: >
      You should now see the **Contact** section with the enquiry form and
      GRIMME service contact details.
    highlight: true
    screenshot: viewport
